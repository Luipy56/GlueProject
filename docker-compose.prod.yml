# Producción: imagen con código copiado; tras cambios en app/plantillas hace falta rebuild.
#   docker compose -f docker-compose.prod.yml up -d --build
name: glueproject
services:
  app:
    build: .
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GPM_DATA_DIR: /data
    volumes:
      - gpm_data:/data

volumes:
  gpm_data:
