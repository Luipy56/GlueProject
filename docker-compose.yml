services:
  app:
    build: .
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GPM_DATA_DIR: /data
      # Ollama / túnel SSH en el host (no uses 127.0.0.1 dentro del contenedor).
      GPM_LLM_BASE_URL: http://host.docker.internal:11434
    volumes:
      - gpm_data:/data

volumes:
  gpm_data:
