# Desarrollo: código montado desde el host + uvicorn --reload (Python, HTML, CSS, JS bajo app/).
# Datos: mismo volumen que producción (glueproject_gpm_data).
#   docker compose -f docker-compose.dev.yml up --build
name: glueproject-dev
services:
  app:
    build: .
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GPM_DATA_DIR: /data
    volumes:
      - glueproject_gpm_data:/data
      - ./app:/app/app
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/app
      - --reload-include
      - "*.html"
      - --reload-include
      - "*.css"
      - --reload-include
      - "*.js"

volumes:
  glueproject_gpm_data:
    external: true
    name: glueproject_gpm_data
