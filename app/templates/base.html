<!DOCTYPE html>
<html lang="{{ html_lang }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{% block title %}{{ _('base.default_title') }}{% endblock %}</title>
  <link rel="icon" href="/static/favicon.png" type="image/png" sizes="32x32" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <script>
  (function () {
    try {
      var t = localStorage.getItem("gpm-theme");
      if (t !== "light" && t !== "dark") {
        t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
  </script>
  <style>
    /* Default tokens on `html` so body always has contrast if JS/localStorage fails or before data-theme is set. */
    html {
      color-scheme: light;
      --bg: #f4f4f5;
      --bg-muted: #e4e4e7;
      --surface: #ffffff;
      --surface-2: #f4f4f5;
      --text: #18181b;
      --text-muted: #71717a;
      --border: #e4e4e7;
      --border-strong: #d4d4d8;
      --accent: #27272a;
      --accent-hover: #09090b;
      --on-accent: #fafafa;
      --link: #3f3f46;
      --link-hover: #18181b;
      --focus-ring: #52525b;
      --danger: #b91c1c;
      --danger-hover: #991b1b;
      --on-danger: #fafafa;
      --danger-surface: #fef2f2;
      --danger-border: #fecaca;
      --ok-surface: #f4f4f5;
      --ok-border: #d4d4d8;
      --warn-surface: #fafafa;
      --warn-border: #e4e4e7;
      --warn-accent: #a16207;
      --shadow: 0 1px 2px rgba(9, 9, 11, 0.05), 0 4px 16px rgba(9, 9, 11, 0.06);
      --shadow-nav: 0 1px 0 rgba(9, 9, 11, 0.06);
      --radius: 12px;
      --radius-sm: 8px;
      --font: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #09090b;
      --bg-muted: #18181b;
      --surface: #121215;
      --surface-2: #27272a;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --border-strong: #3f3f46;
      --accent: #fafafa;
      --accent-hover: #e4e4e7;
      --on-accent: #18181b;
      --link: #d4d4d8;
      --link-hover: #fafafa;
      --focus-ring: #a1a1aa;
      --danger: #f87171;
      --danger-hover: #fca5a5;
      --on-danger: #18181b;
      --danger-surface: #1c1212;
      --danger-border: #5c2a2a;
      --ok-surface: #18181b;
      --ok-border: #3f3f46;
      --warn-surface: #18181b;
      --warn-border: #3f3f46;
      --warn-accent: #eab308;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
      --shadow-nav: 0 1px 0 rgba(255, 255, 255, 0.06);
      --radius: 12px;
      --radius-sm: 8px;
      --font: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      font-size: 0.9375rem;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 500;
      border-radius: 4px;
    }
    a:hover { color: var(--link-hover); text-decoration: underline; }
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
    }
    .site-header {
      position: sticky;
      top: 0;
      z-index: 40;
      padding-top: env(safe-area-inset-top, 0px);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-nav);
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 max(clamp(0.75rem, 4vw, 1.25rem), env(safe-area-inset-left, 0px)) 0 max(clamp(0.75rem, 4vw, 1.25rem), env(safe-area-inset-right, 0px));
    }
    .header-shell {
      padding: 0.75rem 0;
    }
    @media (max-width: 720px) {
      .wrap {
        padding-left: max(1rem, 5vw, env(safe-area-inset-left, 0px));
        padding-right: max(1rem, 5vw, env(safe-area-inset-right, 0px));
      }
      .header-shell {
        padding-top: 0.65rem;
        padding-bottom: 0.65rem;
      }
      .header-top {
        row-gap: 0.65rem;
      }
      .nav-toggle {
        display: inline-flex;
      }
      .header-nav-row {
        position: fixed;
        left: 0;
        right: 0;
        top: var(--gpm-header-h, 5.75rem);
        bottom: 0;
        margin-top: 0;
        padding: 0.75rem max(1rem, 5vw) max(1rem, env(safe-area-inset-bottom, 0px));
        border-top: 1px solid var(--border);
        background: var(--surface);
        box-shadow: var(--shadow);
        z-index: 35;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        transform: translateX(-105%);
        visibility: hidden;
        transition: transform 0.22s ease, visibility 0.22s ease;
      }
      body.gpm-nav-open .site-header .header-nav-row {
        transform: translateX(0);
        visibility: visible;
      }
      .main-nav {
        flex-direction: column;
        align-items: stretch;
        flex-wrap: nowrap;
        overflow: visible;
        gap: 0.35rem;
        padding: 0;
        scroll-padding: 0;
      }
      .main-nav a {
        white-space: normal;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-sm);
      }
      body.gpm-nav-open {
        overflow: hidden;
      }
      .gpm-nav-backdrop {
        display: block;
        position: fixed;
        left: 0;
        right: 0;
        top: var(--gpm-header-h, 5.75rem);
        bottom: 0;
        z-index: 34;
        background: rgba(9, 9, 11, 0.52);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.22s ease, visibility 0.22s ease;
      }
      html[data-theme="light"] .gpm-nav-backdrop {
        background: rgba(9, 9, 11, 0.28);
      }
      body.gpm-nav-open .gpm-nav-backdrop {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
    }
    .header-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem 1rem;
    }
    .header-top-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
      flex-shrink: 0;
    }
    .nav-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      padding: 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-muted);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
    }
    .nav-toggle:hover {
      background: var(--surface-2);
      border-color: var(--border-strong);
    }
    .nav-toggle:active {
      transform: scale(0.96);
    }
    .gpm-nav-backdrop {
      display: none;
    }
    .header-nav-row {
      margin-top: 0.5rem;
      padding-top: 0.45rem;
      border-top: 1px solid var(--border);
    }
    @media (min-width: 721px) and (max-width: 960px) {
      .main-nav {
        flex-wrap: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        gap: 0.35rem;
        padding: 0 0.35rem 0.2rem;
        scroll-padding-inline: 0.65rem;
      }
      .main-nav::-webkit-scrollbar {
        height: 4px;
      }
      .main-nav::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 4px;
      }
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }
    .brand:hover { color: var(--text); text-decoration: none; }
    .brand-mark {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: var(--radius-sm);
      background: linear-gradient(145deg, var(--accent-hover), var(--accent));
      color: var(--on-accent);
      display: grid;
      place-items: center;
      font-size: 0.85rem;
      font-weight: 700;
      box-shadow: var(--shadow);
    }
    .brand-name {
      min-width: 0;
    }
    @media (max-width: 360px) {
      .brand-name {
        display: none;
      }
      .brand {
        gap: 0.5rem;
      }
    }
    .header-tools {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0.65rem 0.85rem;
      padding: 0.2rem 0 0.2rem 0.35rem;
      flex-shrink: 0;
    }
    .main-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.2rem;
      width: 100%;
    }
    .main-nav a {
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .main-nav a:hover {
      color: var(--text);
      background: var(--bg-muted);
      text-decoration: none;
    }
    .main-nav a.nav-link--active {
      color: var(--on-accent);
      background: var(--accent);
      text-decoration: none;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .lang-select-wrap {
      display: flex;
      align-items: center;
    }
    .lang-select {
      min-width: 8.5rem;
      max-width: 12rem;
      padding: 0.45rem 0.65rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      line-height: 1.3;
      cursor: pointer;
      color-scheme: inherit;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }
    .lang-select:hover {
      border-color: var(--border-strong);
      background-color: var(--surface-2);
    }
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.75rem;
      min-height: 2.75rem;
      width: 2.75rem;
      height: 2.75rem;
      padding: 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-muted);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
    }
    .theme-toggle:hover {
      background: var(--surface-2);
      border-color: var(--border-strong);
    }
    .theme-toggle:active { transform: scale(0.96); }
    .theme-toggle .icon-dark { display: none; }
    html[data-theme="dark"] .theme-toggle .icon-light { display: none; }
    html[data-theme="dark"] .theme-toggle .icon-dark { display: block; }
    .version-pill {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    main .wrap {
      padding-top: clamp(1.1rem, 4vw, 1.75rem);
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
    }
    main h1 {
      font-size: clamp(1.28rem, 4.2vw, 1.65rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 0.5rem;
      line-height: 1.2;
    }
    .muted {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      margin: 1.25rem 0 1rem;
    }
    @media (max-width: 560px) {
      .toolbar {
        flex-direction: column;
        align-items: stretch;
        gap: 0.75rem;
      }
      .toolbar form.gpm-scrape-form {
        width: 100%;
      }
      .toolbar form.gpm-scrape-form button.primary {
        width: 100%;
        min-height: 2.75rem;
      }
    }
    .row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .table-scroll {
      overflow: auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: var(--surface);
      max-width: 100%;
    }
    table {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    @media (max-width: 640px) {
      table {
        font-size: 0.8125rem;
      }
      th, td {
        padding: 0.5rem 0.55rem;
      }
      th {
        font-size: 0.68rem;
      }
    }
    th, td {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      text-align: left;
    }
    th {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--surface-2);
    }
    tbody tr {
      transition: background 0.1s ease;
    }
    tbody tr:hover {
      background: var(--bg-muted);
    }
    tbody tr:last-child td {
      border-bottom: none;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:hover, textarea:hover, select:hover {
      border-color: var(--border-strong);
    }
    textarea {
      min-height: 120px;
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.45;
    }
    code {
      font-family: var(--mono);
      font-size: 0.84em;
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    button, .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      min-height: 2.5rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    }
    button:hover, .btn:hover {
      background: var(--bg-muted);
      border-color: var(--border-strong);
    }
    button.primary, .btn.primary {
      background: var(--accent);
      border-color: transparent;
      color: var(--on-accent);
    }
    button.primary:hover, .btn.primary:hover {
      background: var(--accent-hover);
      border-color: transparent;
      color: var(--on-accent);
    }
    button.danger, .btn.danger {
      background: var(--danger-surface);
      border-color: var(--danger-border);
      color: var(--danger);
    }
    button.danger:hover, .btn.danger:hover {
      background: var(--danger);
      border-color: var(--danger);
      color: var(--on-danger);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.35rem;
      margin-bottom: 1.1rem;
      box-shadow: var(--shadow);
    }
    .card > h2, .card > h3, .card-heading {
      margin-top: 0;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .card--warning {
      background: var(--warn-surface);
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-left-color: var(--warn-accent);
    }
    .card--danger {
      border-color: var(--danger-border);
      background: var(--danger-surface);
    }
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.25rem;
    }
    @media (max-width: 800px) {
      .grid2 { grid-template-columns: 1fr; }
    }
    button:disabled { opacity: 0.65; cursor: wait; }
    tr.run-row-failed {
      background: var(--danger-surface) !important;
      box-shadow: inset 0 0 0 1px var(--danger-border);
    }
    tr.run-row-failed:hover {
      background: var(--danger-surface) !important;
    }
    .banner-ok {
      border: 1px solid var(--ok-border);
      background: var(--ok-surface);
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      margin-bottom: 1.1rem;
    }
    .banner-ok strong { color: var(--text); }
    pre {
      font-family: var(--mono);
      font-size: 0.82rem;
    }
    input[type="checkbox"] {
      accent-color: var(--focus-ring);
      width: 1.1rem;
      height: 1.1rem;
      vertical-align: middle;
    }
    @media (max-width: 560px) {
      .card.row,
      form.card.row {
        flex-direction: column;
        align-items: stretch;
      }
      .card.row button.primary,
      form.card.row button.primary {
        width: 100%;
        min-height: 2.75rem;
      }
      .card form .row {
        flex-direction: column;
        align-items: stretch;
      }
      .card form .row button {
        width: 100%;
        min-height: 2.75rem;
      }
      .card form > p:has(.primary:only-child) .primary {
        width: 100%;
        min-height: 2.75rem;
      }
    }
    @media (max-width: 480px) {
      .card {
        padding: 1rem 1rem;
      }
      input[type="text"], input[type="number"], select {
        min-height: 2.75rem;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body
  data-gpm-submitting="{{ _('js.submitting')|e }}"
  data-theme-aria-dark="{{ _('nav.theme_aria_dark')|e }}"
  data-theme-aria-light="{{ _('nav.theme_aria_light')|e }}"
  data-nav-open="{{ _('nav.menu_open')|e }}"
  data-nav-close="{{ _('nav.menu_close')|e }}"
>
  {% set path = request.url.path %}
  <header class="site-header">
    <div class="wrap header-shell">
      <div class="header-top">
        <a class="brand" href="/" title="{{ _('base.default_title') }}">
          <span class="brand-mark" aria-hidden="true">G</span>
          <span class="brand-name">Garraf Monitor</span>
        </a>
        <div class="header-top-actions">
          <button
            type="button"
            class="nav-toggle"
            id="gpm-nav-toggle"
            aria-controls="gpm-main-nav"
            aria-expanded="false"
            aria-label="{{ _('nav.menu_open')|e }}"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div class="header-tools">
          <button type="button" class="theme-toggle" id="gpm-theme-toggle" aria-label="">
            <svg class="icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
            <svg class="icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
          <div class="lang-select-wrap">
            <label for="gpm-lang-select" class="visually-hidden">{{ _('nav.lang_select_label') }}</label>
            <select id="gpm-lang-select" class="lang-select" aria-label="{{ _('nav.lang_select_label')|e }}">
              {% for code in gpm_locales %}
              <option value="{{ code }}" lang="{{ code }}" {% if locale == code %}selected{% endif %}>{{ gpm_locale_native_labels.get(code, code) }}</option>
              {% endfor %}
            </select>
          </div>
          <span class="version-pill" title="{{ _('nav.version_title') }}">{{ _('nav.version_label') }} {{ app_version }}</span>
          </div>
        </div>
      </div>
      <div class="header-nav-row">
        <nav id="gpm-main-nav" class="main-nav" aria-label="Main">
          <a href="/" class="{% if path == '/' %}nav-link--active{% endif %}">{{ _('nav.listings') }}</a>
          <a href="/runs" class="{% if path == '/runs' or path.startswith('/runs/') %}nav-link--active{% endif %}">{{ _('nav.runs') }}</a>
          <a href="/portals" class="{% if path == '/portals' %}nav-link--active{% endif %}">{{ _('nav.portals') }}</a>
          <a href="/config" class="{% if path == '/config' %}nav-link--active{% endif %}">{{ _('nav.config') }}</a>
          <a href="/blacklist" class="{% if path == '/blacklist' %}nav-link--active{% endif %}">{{ _('nav.blacklist') }}</a>
          <a href="/documentation" class="{% if path == '/documentation' %}nav-link--active{% endif %}">{{ _('nav.documentation') }}</a>
        </nav>
      </div>
    </div>
  </header>
  <div class="gpm-nav-backdrop" id="gpm-nav-backdrop" aria-hidden="true"></div>
  <main><div class="wrap">{% block content %}{% endblock %}</div></main>
  <script>
  (function () {
    var submittingMsg = document.body.getAttribute("data-gpm-submitting") || "";
    document.querySelectorAll("form.gpm-scrape-form").forEach(function (form) {
      form.addEventListener("submit", function (e) {
        if (form.dataset.gpmSubmitting === "1") {
          e.preventDefault();
          return;
        }
        form.dataset.gpmSubmitting = "1";
        form.querySelectorAll("button[type='submit'], input[type='submit']").forEach(function (btn) {
          btn.disabled = true;
          if (btn.tagName === "BUTTON" && !btn.dataset.gpmOriginal) {
            btn.dataset.gpmOriginal = btn.textContent;
          }
          if (btn.tagName === "BUTTON") {
            btn.textContent = submittingMsg;
          }
        });
      });
    });
    function themeAria() {
      var t = document.documentElement.getAttribute("data-theme");
      var dark = document.body.getAttribute("data-theme-aria-dark") || "";
      var light = document.body.getAttribute("data-theme-aria-light") || "";
      var btn = document.getElementById("gpm-theme-toggle");
      if (btn) {
        btn.setAttribute("aria-label", t === "dark" ? light : dark);
      }
    }
    function toggleTheme() {
      var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      try {
        localStorage.setItem("gpm-theme", next);
      } catch (e) {}
      themeAria();
    }
    var themeBtn = document.getElementById("gpm-theme-toggle");
    if (themeBtn) {
      themeBtn.addEventListener("click", toggleTheme);
      themeAria();
    }
    var langSel = document.getElementById("gpm-lang-select");
    if (langSel) {
      langSel.addEventListener("change", function () {
        var v = langSel.value;
        if (v) {
          window.location.href = "/set-language/" + encodeURIComponent(v);
        }
      });
    }
    function mobileNavMq() {
      return window.matchMedia("(max-width: 720px)");
    }
    function syncHeaderHeight() {
      var h = document.querySelector(".site-header");
      if (h) {
        document.documentElement.style.setProperty("--gpm-header-h", h.offsetHeight + "px");
      }
    }
    function setNavOpen(open) {
      var bd = document.getElementById("gpm-nav-backdrop");
      var tb = document.getElementById("gpm-nav-toggle");
      var navOpen = document.body.getAttribute("data-nav-open") || "";
      var navClose = document.body.getAttribute("data-nav-close") || "";
      if (open) {
        document.body.classList.add("gpm-nav-open");
        if (tb) {
          tb.setAttribute("aria-expanded", "true");
          tb.setAttribute("aria-label", navClose);
        }
        if (bd) {
          bd.setAttribute("aria-hidden", "false");
        }
        if (mobileNavMq().matches) {
          document.body.style.overflow = "hidden";
        }
      } else {
        document.body.classList.remove("gpm-nav-open");
        if (tb) {
          tb.setAttribute("aria-expanded", "false");
          tb.setAttribute("aria-label", navOpen);
        }
        if (bd) {
          bd.setAttribute("aria-hidden", "true");
        }
        document.body.style.overflow = "";
      }
      syncHeaderHeight();
    }
    function toggleNav() {
      setNavOpen(!document.body.classList.contains("gpm-nav-open"));
    }
    var navToggle = document.getElementById("gpm-nav-toggle");
    var navBackdrop = document.getElementById("gpm-nav-backdrop");
    var mainNav = document.getElementById("gpm-main-nav");
    if (navToggle) {
      navToggle.addEventListener("click", function (e) {
        e.stopPropagation();
        toggleNav();
      });
    }
    if (navBackdrop) {
      navBackdrop.addEventListener("click", function () {
        setNavOpen(false);
      });
    }
    if (mainNav) {
      mainNav.querySelectorAll("a").forEach(function (a) {
        a.addEventListener("click", function () {
          setNavOpen(false);
        });
      });
    }
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        setNavOpen(false);
      }
    });
    window.addEventListener("resize", function () {
      syncHeaderHeight();
      if (!mobileNavMq().matches) {
        setNavOpen(false);
      }
    });
    var siteHeader = document.querySelector(".site-header");
    if (siteHeader && typeof ResizeObserver !== "undefined") {
      new ResizeObserver(syncHeaderHeight).observe(siteHeader);
    }
    syncHeaderHeight();
  })();
  </script>
</body>
</html>
