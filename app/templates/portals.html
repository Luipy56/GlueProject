{% extends "base.html" %}
{% block title %}Portales · Garraf Monitor{% endblock %}
{% block content %}
<h1>Portales</h1>
<div class="card">
  <h2 style="margin-top:0;">Añadir portal</h2>
  <form method="post" action="/portals/add">
    <label for="name">Nombre</label>
    <input id="name" name="name" type="text" required />
    <label for="search_url" style="margin-top:0.75rem;">URL de búsqueda</label>
    <input id="search_url" name="search_url" type="text" required />
    <label for="prompt_template" style="margin-top:0.75rem;">Plantilla de instrucciones (portal)</label>
    <textarea id="prompt_template" name="prompt_template" required></textarea>
    <label style="margin-top:0.75rem;"><input type="checkbox" name="fetch_detail_for_phone" /> Abrir detalle para teléfono (Idealista)</label>
    <p><button class="primary" type="submit">Crear</button></p>
  </form>
</div>
{% for p in portals %}
<div class="card">
  <h3 style="margin-top:0;">{{ p.name }} {% if not p.enabled %}<span class="muted">(desactivado)</span>{% endif %}</h3>
  <form method="post" action="/portals/edit">
    <input type="hidden" name="portal_id" value="{{ p.id }}" />
    <label>Nombre</label>
    <input name="name" type="text" value="{{ p.name }}" required />
    <label style="margin-top:0.75rem;">URL</label>
    <input name="search_url" type="text" value="{{ p.search_url }}" required />
    <label style="margin-top:0.75rem;">Instrucciones</label>
    <textarea name="prompt_template" required>{{ p.prompt_template }}</textarea>
    <label style="margin-top:0.75rem;"><input type="checkbox" name="fetch_detail_for_phone" {% if p.fetch_detail_for_phone %}checked{% endif %} /> Detalle teléfono</label>
    <label style="margin-top:0.75rem;"><input type="checkbox" name="enabled" {% if p.enabled %}checked{% endif %} /> Activo</label>
    <p class="row">
      <button class="primary" type="submit">Guardar</button>
    </p>
  </form>
  <form method="post" action="/portals/delete" onsubmit="return confirm('¿Borrar portal y sus listados asociados?');">
    <input type="hidden" name="portal_id" value="{{ p.id }}" />
    <button class="danger" type="submit">Eliminar</button>
  </form>
</div>
{% else %}
<p class="muted">No hay portales.</p>
{% endfor %}
{% endblock %}
